<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../CSS/cadastro.css">
</head>
  <body>
    <canvas id="particles"></canvas>

    <header class="header">
        <nav class="navbar">
            <div class="logo-nav">
                <!-- TODO logo image here -->
                GAMEHIST
            </div>
            <div class="auth-btn">
                <button class="btn">Sign In</button>
                <button class="btn navbutton">Home</button>
            </div>
        </nav>
    </header>
    
    <main class="centralizar">
    
    <div class="divform">

    <h1>Criar conta</h1>

    <hr>

    <form action="#" method="POST">
    <div class="d-flex gap-2">
    <div>
    <label for="" class="form-label"><i class="bi bi-person"></i> Nome</label>
    <input type="text" class="form-control" placeholder="Nome">
    </div>
    <div>
    <label for="" class="form-label"><i class="bi bi-person"></i> Nick</label>
    <input type="text" class="form-control" placeholder="Nick">
    </div>
    </div>
    <div class="justificar">
    <label for="" class="form-label"><i class="bi bi-envelope"></i> E-mail</label>
    <input type="text" class="form-control" placeholder="E-mail">
    </div>
    <div class="justificar">
    <label for="" class="form-label"><i class="bi bi-telephone"></i> Telefone</label>
    <input type="text" class="form-control" placeholder="Telefone">
    </div>
    <div class="justificar">
     <label for="" class="form-label"><i class="bi bi-calendar"></i> Data de nascimento</label>
    <input type="date" class="form-control" placeholder="Senha" class="input-date">
    </div>  
    <div class="justificar alinhartermos">
      <input type="checkbox"><p>Aceitar os termos de uso</p>
    </div>
    
    <button class="btn btn-primary form-control justificar">Cadastrar</button>
    <br>
    </form>
    </div>
    </main>
    <script src="../js/particles.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
