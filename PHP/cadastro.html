<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../CSS/cadastro.css">
</head>
  <body>
    <canvas id="particles"></canvas>
    <main class="centralizar">
    
    <div class="divform">

    <h1>Criar conta</h1>

    <hr>

    <form action="#" method="POST">
    <div>
    <label for="" class="form-label"><i class="bi bi-person"></i> Nome</label>
    <input type="text" class="form-control" placeholder="Nome">
    </div>
    <div class="justificar">
    <label for="" class="form-label"><i class="bi bi-envelope"></i> E-mail</label>
    <input type="text" class="form-control" placeholder="E-mail">
    </div>
    <div class="justificar">
     <label for="" class="form-label"><i class="bi bi-lock"></i> Senha</label>
    <input type="password" class="form-control" placeholder="Senha">
    </div>
    <div class="justificar">
    <label for="" class="form-label"><i class="bi bi-lock"></i> Confirma senha</label>
    <input type="password" class="form-control" placeholder="Confirma senha">
    </div>
    <div class="justificar alinhartermos">
      <input type="checkbox"><p>Aceitar os termos de uso</p>
    </div>
    
    <button class="btn btn-primary form-control justificar">Cadastrar</button>

    </form>
    </div>
    </main>
    <script src="../js/particles.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
